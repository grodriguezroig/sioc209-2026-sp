# SIOC 209 – Deep Learning for Geo & Environmental Science
# Conda environment for running all course notebooks.
#
# Create:   conda env create -f environment.yml
# Activate: conda activate sioc209
# Update:   conda env update -f environment.yml --prune
#
# Framework strategy (2026):
#   • Keras 3 (multi-backend) for introductory / simpler examples
#   • PyTorch for most hands-on work (matches PINNs, KANs, research ecosystem)
#   • JAX may be added in a future iteration

name: sioc209_test

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ──────────────────────────────────────────────
  - python=3.10

  # ── Core scientific stack ───────────────────────────────
  - numpy
  - pandas
  - scipy
  - xarray
  - netcdf4

  # ── Visualization ───────────────────────────────────────
  - matplotlib
  - cartopy

  # ── Classical ML ────────────────────────────────────────
  - scikit-learn

  # ── Jupyter / notebook tooling ──────────────────────────
  - jupyter
  - notebook>=7
  - jupyter-book
  - ipywidgets

  # ── Image I/O ───────────────────────────────────────────
  - pillow
  - imageio

  # ── pip-only packages ───────────────────────────────────
  - pip
  - pip:
      # Deep learning (PyTorch — primary)
      # PyTorch ≥2.6 required for Keras 3 Conv2D compatibility
      - torch>=2.6
      - torchvision
      # Keras 3 multi-backend (uses PyTorch backend by default in this env)
      - keras>=3.0
      # NLP / LLMs
      - transformers
      # Gaussian Processes
      - gpflow
      # Kolmogorov-Arnold Networks
      - pykan
      # ClimateBench utilities
      - eofs
      - esem
      # Self-organising maps
      - minisom
